<!DOCTYPE html>
<html>
<head>
<title>College Event</title>
<style>
body {
    margin: 0;
    padding: 0;
    background-image: url('./poster.jpg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    font-family: Arial;
}

.button-box {
    position: absolute;
    bottom: 30px;
    right: 30px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.admin {
    background-color: red;
    color: white;
}

.user {
    background-color: green;
    color: white;
}
</style>
</head>

<body>

<div class="button-box">
    <button class="admin">Admin Login</button>
    <button class="user">User Login</button>
</div>

</body>
</html>
