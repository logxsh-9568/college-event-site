<!DOCTYPE html>
<html>
<head>
<title>College Event</title>
<style>
body{
margin:0;
font-family:Arial;
scroll-behavior:smooth;
background:linear-gradient(135deg,#141e30,#243b55,#0f2027);
color:white;
text-align:center;
}

.front{
height:100vh;
background-image:url('poster.jpg.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.second{
height:100vh;
background:
linear-gradient(rgba(0,40,80,0.75), rgba(0,40,80,0.75)),
url('background.jpeg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.second img{
width:700px;
max-width:90%;
margin-bottom:30px;
}

.third{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.container{
width:90%;
max-width:1000px;
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#00eaff;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:25px;
}

.card{
height:90px;
border-radius:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.nextBtn{
display:none;
position:fixed;
right:25px;
bottom:25px;
z-index:9999;
padding:14px 24px;
}
</style>
</head>

<body>

<div class="front"></div>

<div class="second">
<img src="college.jpg.jpeg">
<h2>Department of CSE</h2>
<h3>(Artificial Intelligence and Machine Learning)</h3>
<h2>AI-APP SPRINT 1.0</h2>
<p>Event Date : 14-03-2026</p>
<p>Venue : AIML Lab</p>
</div>

<div class="third">
<div class="container" id="content">

<h1>AI-APP SPRINT 1.0</h1>
<h2>Level 1 – Technical Quiz</h2>
<p>Click below to start quiz</p>

<button onclick="startQuiz()">Start Quiz</button>

</div>
</div>

<script>

let questions=[
"Student Registration Form",
"Hospital Appointment Booking System",
"Employee Registration System",
"Bus Ticket Booking System",
"Online Survey Form",
"Internship Application Form",
"Calculator",
"Calendar",
"Library Membership Form",
"Online Quiz Application",
"Food Order Application",
"Message (Inbox / Outbox)",
"Gallery",
"Alarm",
"Notes",
"Compass",
"Music"
];

let innovativeTopics=[
"Smart Waste & Recycling App",
"AI Study Planner App",
"Plant Disease Detection App",
"Food Donation App",
"Smart Parking Finder",
"Mobile Banking System",
"Medicine Reminder App",
"College Event Tracker",
"Fitness Tracker",
"Volunteer Management App"
];

let selected=false;

function startQuiz(){
sessionStorage.setItem("openLevel2","yes");
window.location.href="https://quiz.com/join/abc123";
}

function showTopicPage(){

selected=false;
let cards="";

for(let i=0;i<17;i++){
cards+=`
<div class="card">
<p class="q"></p>
<button onclick="reveal(this,${i})">Reveal Question</button>
</div>`;
}

document.getElementById("content").innerHTML=`
<h1>Level 2 – Logical Test</h1>
<p>Reveal one topic only</p>
<div class="grid">${cards}</div>
<button id="nextBtn" class="nextBtn" onclick="openForm()">Submit APK</button>
`;
}

function reveal(btn,index){

if(selected) return;

let card=btn.parentElement;
card.querySelector(".q").innerText=questions[index];

selected=true;

document.querySelectorAll(".card button").forEach(b=>{
if(b!==btn){ b.disabled=true; }
});

document.getElementById("nextBtn").style.display="inline-block";
}

function openForm(){

showLevel3();

window.open("https://docs.google.com/forms/d/e/1FAIpQLSdaJDtSHMPhGYxpClndyngY49_0L_2ohp1Lpm3T1xHaAbCm6Q/viewform?usp=publish-editor","_blank");
}

function showLevel3(){

selected=false;
let cards="";

for(let i=0;i<10;i++){
cards+=`
<div class="card">
<p class="q"></p>
<button onclick="revealLevel3(this,${i})">Reveal</button>
</div>`;
}

document.getElementById("content").innerHTML=`
<h1>Level 3 - Innovative Challenge</h1>
<p>Reveal one topic only</p>
<div class="grid">${cards}</div>
<button id="nextBtn" class="nextBtn" onclick="openLevel3Form()">Submit Level 3</button>
`;
}

function revealLevel3(btn,index){

if(selected) return;

let card=btn.parentElement;
card.querySelector(".q").innerText=innovativeTopics[index];

selected=true;

document.querySelectorAll(".card button").forEach(b=>{
if(b!==btn){ b.disabled=true; }
});

document.getElementById("nextBtn").style.display="inline-block";
}

function openLevel3Form(){

sessionStorage.setItem("showThank","yes");
window.location.href="https://forms.gle/JhHv7DdCk54hfeJf7";

}

function showThankYou(){

document.getElementById("content").innerHTML=`
<img src="thankyou.jpg.jpeg" style="width:100%;max-width:1000px;border-radius:15px;box-shadow:0 0 25px gold;">
`;

}

window.addEventListener("pageshow", function(){

if(sessionStorage.getItem("showThank")=="yes"){
showThankYou();
sessionStorage.removeItem("showThank");
return;
}

if(sessionStorage.getItem("openLevel2")=="yes"){
showTopicPage();
sessionStorage.removeItem("openLevel2");
}

});

</script>

</body>
</html>
